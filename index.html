<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2026年全国足球统一考试</title>
  <script>
  window.addEventListener('pageshow', function(e) {
    if (e.persisted) { location.reload(); }
  });
  </script>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --paper: #f5f0e8;
  --paper-dark: #e8e0d0;
  --ink: #1a1a1a;
  --ink-light: #444;
  --red: #cc0000;
  --red-dark: #990000;
  --blue: #0033cc;
  --border: #333;
  --grid-line: rgba(0,0,0,0.06);
  --sidebar-w: 52px;
}

html, body {
  height: 100%;
  font-family: "Songti SC", "SimSun", "Noto Serif CJK SC", serif;
  background: #d4cfc5;
  color: var(--ink);
  -webkit-font-smoothing: auto;
}

.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* ========== 试卷纸张 ========== */
.paper {
  max-width: 460px;
  margin: 0 auto;
  background: var(--paper);
  min-height: 100vh;
  padding: 0;
  box-shadow: 2px 2px 20px rgba(0,0,0,0.15);
  position: relative;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 31px, var(--grid-line) 31px, var(--grid-line) 32px);
}

/* ========== 左侧答题卡栏 ========== */
.answer-sheet {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: var(--sidebar-w);
  z-index: 50;
  background: var(--paper-dark);
  border-right: 2px solid #bbb;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 3px;
  padding-top: calc(6px + env(safe-area-inset-top));
  padding-bottom: calc(6px + env(safe-area-inset-bottom));
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.answer-sheet::-webkit-scrollbar { display: none; }

.answer-sheet-title {
  font-size: 10px;
  color: #999;
  letter-spacing: 1px;
  writing-mode: vertical-rl;
  margin-bottom: 6px;
  flex-shrink: 0;
  white-space: nowrap;
}

.answer-grid {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  width: 100%;
  align-items: center;
  min-height: 0;
}

.answer-dot {
  width: 38px;
  height: 28px;
  border: 1px solid #ccc;
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-family: "Courier New", monospace;
  color: #bbb;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
  background: rgba(255,255,255,0.4);
}

.answer-dot.filled {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
  font-weight: 700;
}

.answer-dot.current {
  border-color: var(--red);
  color: var(--red);
}

.btn-submit {
  width: 100%;
  padding: 12px 0;
  border: 2px solid var(--red);
  border-radius: 4px;
  background: #fff;
  color: var(--red);
  font-size: 15px;
  font-weight: 700;
  font-family: "Songti SC", "SimSun", serif;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-submit:active {
  background: var(--red);
  color: #fff;
}

.btn-submit:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* 手机端试卷给左侧答题卡让位 */
@media (max-width: 539px) {
  .paper { margin-left: var(--sidebar-w); max-width: none; width: calc(100vw - var(--sidebar-w)); }
}
@media (min-width: 540px) {
  .answer-sheet { display: none; }
  .paper { max-width: 460px; margin: 0 auto; }
}

/* ========== 试卷头部 ========== */
.exam-header {
  background: #fff;
  border-bottom: 3px double var(--border);
  padding: 16px 14px 12px;
  text-align: center;
  position: relative;
}

.exam-year {
  font-size: clamp(11px, 3vw, 13px);
  color: var(--ink-light);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.exam-title {
  font-size: clamp(17px, 5vw, 22px);
  font-weight: 900;
  color: var(--red);
  letter-spacing: clamp(2px, 1vw, 4px);
  margin-bottom: 2px;
}

.exam-subtitle {
  font-size: clamp(11px, 3vw, 13px);
  color: var(--ink-light);
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.exam-stars {
  color: var(--red);
  font-size: 10px;
  letter-spacing: 4px;
  margin-bottom: 10px;
}

.exam-info {
  display: flex;
  justify-content: space-between;
  font-size: clamp(11px, 2.8vw, 13px);
  color: var(--ink-light);
  border-top: 1px solid #ddd;
  padding-top: 8px;
  flex-wrap: wrap;
  gap: 4px;
}

.exam-info-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.exam-info-item .blank {
  display: inline-block;
  width: clamp(55px, 18vw, 80px);
  border-bottom: 1px solid var(--border);
  height: 20px;
  text-align: center;
  font-family: "Courier New", monospace;
  font-size: clamp(10px, 2.5vw, 12px);
  color: var(--blue);
}

/* ========== 注意事项 ========== */
.exam-notice {
  padding: 10px 14px;
  border-bottom: 1px solid #ddd;
  font-size: clamp(13px, 3.2vw, 14px);
  color: var(--ink-light);
  line-height: 1.8;
  background: rgba(255,255,255,0.5);
}

.exam-notice-title {
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}

/* ========== 大题标题 ========== */
.section-header {
  padding: 12px 14px 8px;
  font-size: clamp(15px, 4vw, 17px);
  font-weight: 700;
  color: var(--ink);
  border-bottom: 1px solid #e0d8c8;
}

.section-header .section-score {
  font-weight: 400;
  font-size: clamp(12px, 3vw, 14px);
  color: var(--ink-light);
}

/* ========== 题目 ========== */
.question-item {
  padding: 12px 14px;
  border-bottom: 1px dotted #d0c8b8;
  transition: background 0.2s;
}

.question-item.answered {
  background: rgba(0, 51, 204, 0.03);
}

.question-num {
  font-weight: 700;
  font-size: clamp(15px, 4vw, 17px);
  color: var(--ink);
  margin-bottom: 4px;
  line-height: 1.7;
}

.question-text {
  font-size: clamp(15px, 4vw, 17px);
  line-height: 1.7;
  margin-bottom: 10px;
  color: var(--ink);
  text-indent: 0;
}

/* ========== 题目带插图布局 ========== */
.question-item.has-figure {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.question-body {
  flex: 1;
  min-width: 0;
}

.question-figure {
  flex-shrink: 0;
  width: clamp(80px, 25vw, 110px);
  text-align: center;
  padding-top: 4px;
}

.question-figure svg {
  width: 100%;
  height: auto;
  opacity: 0.75;
}

.figure-label {
  font-size: 10px;
  color: #999;
  margin-top: 4px;
  font-family: "Songti SC", "SimSun", serif;
}

@media (max-width: 340px) {
  .question-item.has-figure { flex-direction: column; }
  .question-figure { width: 100%; max-width: 140px; margin: 0 auto 8px; }
}

/* ========== 选项 ========== */
.options-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.option-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
  border: 1px solid transparent;
}

.option-item:active {
  background: rgba(0,0,0,0.04);
}

.option-letter {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border: 1.5px solid var(--border);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  font-family: "Times New Roman", serif;
  color: var(--ink);
  transition: all 0.15s;
}

.option-item.selected .option-letter {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}

.option-text {
  font-size: clamp(14px, 3.6vw, 16px);
  line-height: 1.6;
  color: var(--ink);
  padding-top: 1px;
}

/* ========== 进度条 ========== */
.progress-strip {
  height: 3px;
  background: #e0d8c8;
  position: fixed;
  top: 0;
  left: var(--sidebar-w);
  right: 0;
  z-index: 60;
}

@media (min-width: 540px) {
  .progress-strip { left: 0; }
}

.progress-strip-fill {
  height: 100%;
  background: var(--red);
  transition: width 0.4s ease;
}

/* 试卷底部留白 */
#questions-container {
  padding-bottom: 80px;
}

/* ========== 吸底交卷栏 ========== */
.submit-bar {
  position: fixed;
  bottom: 0;
  left: var(--sidebar-w);
  right: 0;
  z-index: 40;
  background: #fff;
  border-top: 2px solid var(--border);
  padding: 10px 16px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
}

@media (min-width: 540px) {
  .submit-bar { left: 0; max-width: 460px; margin: 0 auto; right: 0; }
}

/* ========== 抄答案绿色标记 ========== */
.option-item.cheated .option-letter {
  background: #2e7d32;
  color: #fff;
  border-color: #2e7d32;
}

.option-item.cheated {
  border-color: rgba(46, 125, 50, 0.3);
  background: rgba(46, 125, 50, 0.05);
}

.answer-dot.cheated {
  background: #2e7d32;
  color: #fff;
  border-color: #2e7d32;
  font-weight: 700;
}

/* ========== 抄学霸提示条 ========== */
.cheat-hint {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(135deg, #2e7d32, #43a047);
  color: #fff;
  font-size: 13px;
  padding: 8px 14px;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 6px;
  border-radius: 6px 6px 0 0;
  animation: hintSlideIn 0.3s ease;
  font-family: -apple-system, sans-serif;
}

.cheat-hint::after {
  content: '▸';
  margin-left: auto;
  font-size: 12px;
}

@keyframes hintSlideIn {
  from { transform: translateY(-100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* ========== 复查红色描边 ========== */
.question-item.review-wrong {
  border: 2px solid var(--red);
  border-radius: 6px;
  background: rgba(204, 0, 0, 0.04);
  position: relative;
}

/* ========== 激励视频Mock弹窗 ========== */
.reward-ad-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 300;
  justify-content: center;
  align-items: center;
}
.reward-ad-modal.show { display: flex; }

.reward-ad-inner {
  background: #fff;
  border-radius: 12px;
  padding: 24px 20px 16px;
  width: 280px;
  text-align: center;
}

.reward-ad-label {
  font-size: 10px;
  color: #999;
  letter-spacing: 2px;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.reward-ad-body {
  padding: 20px 0;
}

.reward-ad-icon {
  font-size: 40px;
  margin-bottom: 12px;
}

.reward-ad-text {
  font-size: 14px;
  color: #666;
  margin-bottom: 16px;
  font-family: -apple-system, sans-serif;
}

.reward-ad-countdown {
  font-size: 48px;
  font-weight: 900;
  color: var(--red);
  font-family: "Courier New", monospace;
  line-height: 1;
}

.reward-ad-progress {
  height: 4px;
  background: #eee;
  border-radius: 2px;
  overflow: hidden;
  margin-top: 16px;
}

.reward-ad-progress-fill {
  height: 100%;
  background: var(--red);
  width: 0%;
  transition: width 1s linear;
}

/* ========== 抄答案/复查弹窗 ========== */
.cheat-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 250;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.cheat-modal.show { display: flex; }

.cheat-modal-inner {
  background: #fff;
  border-radius: 12px;
  padding: 24px 20px;
  max-width: 300px;
  width: 100%;
  text-align: center;
}

.cheat-modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 8px;
  font-family: -apple-system, sans-serif;
}

.cheat-modal-desc {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
  line-height: 1.6;
  font-family: -apple-system, sans-serif;
}

.cheat-modal-btn {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-radius: 8px;
  background: #2e7d32;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 10px;
  font-family: -apple-system, sans-serif;
}

.cheat-modal-btn:active {
  background: #1b5e20;
}

.cheat-modal-close {
  width: 100%;
  padding: 10px 0;
  border: none;
  background: transparent;
  font-size: 13px;
  color: #999;
  cursor: pointer;
  font-family: -apple-system, sans-serif;
}

/* ========== Toast ========== */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.8);
  color: #fff;
  font-size: 14px;
  padding: 10px 24px;
  border-radius: 4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 100;
  font-family: -apple-system, sans-serif;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ========== 结果页 — 成绩单 ========== */
#page-result .paper {
  padding-bottom: 40px;
  margin-left: 0;
  max-width: 460px;
  width: 100%;
  margin: 0 auto;
}

.result-header {
  text-align: center;
  padding: 24px 14px 16px;
  border-bottom: 3px double var(--border);
}

.result-header .exam-year { margin-bottom: 4px; }

.result-title {
  font-size: clamp(18px, 5vw, 22px);
  font-weight: 900;
  color: var(--red);
  letter-spacing: clamp(3px, 1.5vw, 6px);
  margin-bottom: 4px;
}

/* 大红印章 */
.stamp {
  width: 120px;
  height: 120px;
  border: 4px solid var(--red);
  border-radius: 50%;
  margin: 20px auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transform: rotate(-8deg);
  position: relative;
  opacity: 0.85;
}

.stamp::after {
  content: '';
  position: absolute;
  inset: -8px;
  border: 2px solid var(--red);
  border-radius: 50%;
  opacity: 0.3;
}

.stamp-score { font-size: 42px; font-weight: 900; color: var(--red); line-height: 1; }
.stamp-label { font-size: 12px; color: var(--red); letter-spacing: 2px; margin-top: 2px; }

/* 段位 */
.rank-section {
  text-align: center;
  padding: 14px 14px 16px;
  border-bottom: 1px solid #e0d8c8;
}

.rank-badge {
  display: inline-block;
  padding: 5px 18px;
  border: 2px solid var(--red);
  font-size: clamp(16px, 4.5vw, 20px);
  font-weight: 900;
  color: var(--red);
  letter-spacing: clamp(2px, 1vw, 4px);
  margin-bottom: 8px;
}

.rank-tagline { font-size: clamp(13px, 3.5vw, 15px); color: var(--ink); font-style: italic; }

.rank-desc {
  font-size: clamp(12px, 3.2vw, 14px);
  color: var(--ink-light);
  line-height: 1.8;
  padding: 14px;
  border-bottom: 1px solid #e0d8c8;
  text-indent: 2em;
}

/* 分类成绩表格 */
.score-table { width: 100%; border-collapse: collapse; font-size: clamp(12px, 3vw, 14px); }
.score-table th, .score-table td { border: 1px solid #ccc; padding: 8px 6px; text-align: center; }
.score-table th { background: rgba(0,0,0,0.04); font-weight: 700; font-size: clamp(11px, 2.8vw, 13px); color: var(--ink); }
.score-table td { color: var(--ink-light); }
.score-table .score-value { font-weight: 700; color: var(--ink); font-size: clamp(14px, 3.5vw, 16px); }
.score-table .score-perfect { color: var(--red); }

/* 答题详情 */
.detail-section { padding: 14px; border-bottom: 1px solid #e0d8c8; }
.detail-title { font-size: clamp(13px, 3.5vw, 15px); font-weight: 700; color: var(--ink); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #e0d8c8; }
.detail-item { padding: 6px 0; border-bottom: 1px dotted #e0d8c8; font-size: clamp(11px, 3vw, 13px); line-height: 1.7; color: var(--ink-light); word-break: break-word; }
.detail-item:last-child { border-bottom: none; }
.detail-correct { color: var(--blue); }
.detail-wrong { color: var(--red); }
.detail-answer { font-size: clamp(10px, 2.5vw, 12px); color: #999; margin-top: 2px; }

/* 底部按钮 */
.result-footer {
  padding: 16px 14px;
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
  display: flex;
  gap: 10px;
}

.btn-retry {
  flex: 1; padding: 11px 0; border: 1.5px solid #ccc; border-radius: 4px;
  background: #fff; font-size: clamp(12px, 3.2vw, 14px);
  font-family: "Songti SC", "SimSun", serif; color: var(--ink-light); cursor: pointer; letter-spacing: 2px;
}

.btn-share-card {
  flex: 1; padding: 11px 0; border: 1.5px solid var(--red); border-radius: 4px;
  background: #fff; font-size: clamp(12px, 3.2vw, 14px);
  font-family: "Songti SC", "SimSun", serif; color: var(--red); cursor: pointer; letter-spacing: 2px;
}

/* 分享弹窗 */
.share-modal {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 200;
  justify-content: center; align-items: center; padding: 20px;
}
.share-modal.show { display: flex; }
.share-modal-inner { background: #fff; border-radius: 8px; padding: 16px; max-width: 340px; width: 100%; text-align: center; }
.share-modal-inner canvas { width: 100%; border-radius: 4px; margin-bottom: 12px; border: 1px solid #eee; }
.btn-save {
  width: 100%; padding: 11px 0; border: 2px solid var(--red); border-radius: 4px;
  background: #fff; font-size: clamp(13px, 3.5vw, 15px); font-weight: 700;
  font-family: "Songti SC", "SimSun", serif; color: var(--red); cursor: pointer; letter-spacing: 2px; margin-bottom: 8px;
}
.btn-close-modal { width: 100%; padding: 10px 0; border: none; background: transparent; font-size: 13px; color: #999; cursor: pointer; }

/* ========== 动画 ========== */
@keyframes stampIn {
  0% { transform: rotate(-8deg) scale(2); opacity: 0; }
  60% { transform: rotate(-8deg) scale(0.95); opacity: 0.9; }
  100% { transform: rotate(-8deg) scale(1); opacity: 0.85; }
}
.stamp.animate { animation: stampIn 0.5s ease-out forwards; }

/* ========== 响应式 ========== */
@media (max-width: 375px) {
  :root { --sidebar-w: 44px; }
  .answer-dot { width: 32px; height: 24px; font-size: 10px; }
  .stamp { width: 100px; height: 100px; }
  .stamp-score { font-size: 36px; }
  .stamp::after { inset: -6px; }
  .submit-bar { padding: 8px 12px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
  .btn-submit { font-size: 13px; padding: 10px 0; }
}

@media (min-width: 540px) {
  #page-result .paper { max-width: 460px; margin: 0 auto; }
  .question-item { padding: 14px 20px; }
  .section-header { padding: 14px 20px 8px; }
  .exam-header { padding: 20px 20px 16px; }
  .exam-notice { padding: 12px 20px; }
}

@media (orientation: landscape) and (max-height: 500px) {
  :root { --sidebar-w: 36px; }
  .answer-dot { height: 18px; font-size: 8px; }
  .btn-submit { padding: 4px 0; font-size: 8px; }
}

  </style>
</head>
<body>

  <div id="page-quiz" class="page active">
    <div class="progress-strip">
      <div id="progress-fill" class="progress-strip-fill" style="width:0%"></div>
    </div>
    <div class="answer-sheet">
      <div class="answer-sheet-title">答题卡</div>
      <div id="answer-grid" class="answer-grid"></div>
    </div>
    <div class="paper">
      <div class="exam-header">
        <div class="exam-year">2026年（全国卷）</div>
        <div class="exam-title">全国足球统一考试</div>

  <script>
/**
 * 足球智商测试 — 计分算法
 */
var Algorithm = (function () {

  function run(selections) {
    var total = QUESTIONS.length;
    var correct = 0;
    var categoryScores = {};

    CATEGORY_KEYS.forEach(function (k) {
      categoryScores[k] = { total: 0, correct: 0, pct: 0 };
    });

    QUESTIONS.forEach(function (q, i) {
      var cat = q.category;
      categoryScores[cat].total++;
      if (selections[i] !== undefined) {
        var opt = q.options[selections[i]];
        if (opt && opt.correct) {
          correct++;
          categoryScores[cat].correct++;
        }
      }
    });

    CATEGORY_KEYS.forEach(function (k) {
      var s = categoryScores[k];
      s.pct = s.total > 0 ? Math.round(s.correct / s.total * 100) : 0;
    });

    var rank = RANKS[RANKS.length - 1];
    for (var i = 0; i < RANKS.length; i++) {
      if (correct >= RANKS[i].minScore) {
        rank = RANKS[i];
        break;
      }
    }

    var pct = Math.round(correct / total * 100);

    return {
      correct: correct,
      total: total,
      pct: pct,
      rank: rank,
      categoryScores: categoryScores
    };
  }

  return { run: run };
})();
  </script>

  <!-- app.js 先加载，渲染题目不依赖广告SDK -->
  <script>
console.log('app.js loading...');
(function () {

  var TOTAL = QUESTIONS.length;
  var selections = {};
  var cheatedQuestions = {};
  var reviewUsed = false;
  var cheatHintTimer = null;
  var LETTERS = ['A', 'B', 'C', 'D'];

  var pageQuiz = document.getElementById('page-quiz');
  var pageResult = document.getElementById('page-result');
  var progressFill = document.getElementById('progress-fill');
  var questionsContainer = document.getElementById('questions-container');
  var answerGrid = document.getElementById('answer-grid');
  var btnSubmit = document.getElementById('btn-submit');
  var submitBar = document.getElementById('submit-bar');
  var toastEl = document.getElementById('toast');

  var cheatModal = document.getElementById('cheat-modal');
  var cheatModalTitle = document.getElementById('cheat-modal-title');
  var cheatModalDesc = document.getElementById('cheat-modal-desc');
  var cheatModalBtn = document.getElementById('cheat-modal-btn');
  var cheatModalClose = document.getElementById('cheat-modal-close');

  document.getElementById('exam-id').textContent = '2026' + Math.floor(10000000 + Math.random() * 90000000);
  document.getElementById('seat-id').textContent = Math.floor(1 + Math.random() * 30);

  init();

  function init() {
    renderQuestions();
    renderAnswerGrid();
    updateProgress();
  }

  // ── 激励视频（委托给 reward-sdk.js） ──
  function showRewardAd(callback) {
    if (typeof RewardAd !== 'undefined') {
      RewardAd.show(callback);
    } else {
      if (callback) callback();
    }
  }

  // ── 填充抄的答案（绿色） ──
  function cheatFillAnswer(qi) {
    var q = QUESTIONS[qi];
    var correctIdx = q.options.findIndex(function (o) { return o.correct; });
    selections[qi] = correctIdx;
    cheatedQuestions[qi] = true;

    var card = questionsContainer.querySelector('[data-qi="' + qi + '"].question-item');
    card.classList.add('answered');
    card.querySelectorAll('.option-item').forEach(function (el) {
      var oi = parseInt(el.getAttribute('data-oi'));
      el.classList.remove('selected', 'cheated');
      if (oi === correctIdx) el.classList.add('cheated');
    });

    // 移除提示条
    var hint = card.querySelector('.cheat-hint');
    if (hint) hint.remove();

    updateProgress();
    updateAnswerGrid();
  }

  // ── 抄答案/复查弹窗逻辑 ──
  var pendingCheatCallback = null;
  var pendingCloseCallback = null;

  function showCheatModal(title, desc, btnText, callback, closeText, closeCallback) {
    cheatModalTitle.textContent = title;
    cheatModalDesc.textContent = desc;
    cheatModalBtn.textContent = btnText;
    cheatModalClose.textContent = closeText || '算了，自己答';
    pendingCheatCallback = callback;
    pendingCloseCallback = closeCallback || null;
    cheatModal.classList.add('show');
  }

  function hideCheatModal() {
    cheatModal.classList.remove('show');
    pendingCheatCallback = null;
    pendingCloseCallback = null;
  }

  cheatModalBtn.addEventListener('click', function () {
    var cb = pendingCheatCallback;
    hideCheatModal();
    if (cb) {
      showRewardAd(cb);
    }
  });

  cheatModalClose.addEventListener('click', function () {
    var cb = pendingCloseCallback;
    hideCheatModal();
    if (cb) cb();
  });

  // ── 渲染题目 ──
  function renderQuestions() {
    var html = '';
    var currentCat = '';
    var sectionNames = {
      rules: '一、规则认知题', history: '二、历史知识题',
      data: '三、数据记忆题', tactics: '四、战术理解题', trivia: '五、冷知识题'
    };
    var sectionScores = {
      rules: '（本大题共4小题，每小题5分，共20分）',
      history: '（本大题共4小题，每小题5分，共20分）',
      data: '（本大题共4小题，每小题5分，共20分）',
      tactics: '（本大题共4小题，每小题5分，共20分）',
      trivia: '（本大题共4小题，每小题5分，共20分）'
    };

    QUESTIONS.forEach(function (q, i) {
      if (q.category !== currentCat) {
        currentCat = q.category;
        html += '<div class="section-header">' + sectionNames[currentCat] +
          ' <span class="section-score">' + sectionScores[currentCat] + '</span></div>';
      }

      var hasFig = (q.figure !== undefined && FIGURES[q.figure]);
      html += '<div class="question-item' + (hasFig ? ' has-figure' : '') + '" data-qi="' + i + '" style="position:relative">';
      html += '<div class="question-body">';
      html += '<div class="question-num">' + (i + 1) + '.</div>';
      html += '<div class="question-text">' + escapeHtml(q.text) + '</div>';
      html += '<ul class="options-list">';
      q.options.forEach(function (opt, oi) {
        html += '<li class="option-item" data-qi="' + i + '" data-oi="' + oi + '">';
        html += '<span class="option-letter">' + LETTERS[oi] + '</span>';
        html += '<span class="option-text">' + escapeHtml(opt.text) + '</span>';
        html += '</li>';
      });
      html += '</ul>';
      html += '</div>';
      if (hasFig) {
        html += '<div class="question-figure">' + FIGURES[q.figure] + '<div class="figure-label">（图' + (i + 1) + '）</div></div>';
      }
      html += '</div>';
    });

    questionsContainer.innerHTML = html;

    questionsContainer.addEventListener('click', function (e) {
      // 抄学霸提示点击
      var hint = e.target.closest('.cheat-hint');
      if (hint) {
        var qi = parseInt(hint.getAttribute('data-qi'));
        hint.remove();
        showCheatModal(
          '抄学霸的答案',
          '看一段视频，获取第' + (qi + 1) + '题的正确答案',
          '看视频，抄答案',
          function () { cheatFillAnswer(qi); }
        );
        return;
      }

      var item = e.target.closest('.option-item');
      if (!item) return;
      var qi = parseInt(item.getAttribute('data-qi'));
      var oi = parseInt(item.getAttribute('data-oi'));

      // 如果之前是抄的，用户重新选择则清除抄的标记
      if (cheatedQuestions[qi]) {
        delete cheatedQuestions[qi];
        var card = item.closest('.question-item');
        card.querySelectorAll('.option-item.cheated').forEach(function (el) {
          el.classList.remove('cheated');
        });
      }

      selections[qi] = oi;

      var card = item.closest('.question-item');
      card.querySelectorAll('.option-item').forEach(function (el) {
        el.classList.toggle('selected', parseInt(el.getAttribute('data-oi')) === oi);
      });
      card.classList.add('answered');

      // 移除提示条
      var existingHint = card.querySelector('.cheat-hint');
      if (existingHint) existingHint.remove();

      updateProgress();
      updateAnswerGrid();

      setTimeout(function () {
        var next = findNextUnanswered(qi);
        if (next !== -1) {
          var nextEl = questionsContainer.querySelector('[data-qi="' + next + '"].question-item');
          if (nextEl) nextEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 250);
    });
  }

  function findNextUnanswered(fromIdx) {
    for (var i = fromIdx + 1; i < TOTAL; i++) {
      if (selections[i] === undefined) return i;
    }
    for (var j = 0; j < fromIdx; j++) {
      if (selections[j] === undefined) return j;
    }
    return -1;
  }

  // ── 答题卡 ──
  function renderAnswerGrid() {
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      html += '<div class="answer-dot" data-qi="' + i + '">' + (i + 1) + '</div>';
    }
    answerGrid.innerHTML = html;

    answerGrid.addEventListener('click', function (e) {
      var dot = e.target.closest('.answer-dot');
      if (!dot) return;
      var qi = parseInt(dot.getAttribute('data-qi'));
      var el = questionsContainer.querySelector('[data-qi="' + qi + '"].question-item');
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        // 未答题显示"抄学霸的"提示
        if (selections[qi] === undefined) {
          showCheatHint(qi, el);
        }
      }
    });
  }

  function showCheatHint(qi, questionEl) {
    // 清除之前的提示
    document.querySelectorAll('.cheat-hint').forEach(function (h) { h.remove(); });
    if (cheatHintTimer) { clearTimeout(cheatHintTimer); cheatHintTimer = null; }

    var hint = document.createElement('div');
    hint.className = 'cheat-hint';
    hint.setAttribute('data-qi', qi);
    hint.innerHTML = '📝 抄学霸第' + (qi + 1) + '题的答案';
    questionEl.appendChild(hint);

    cheatHintTimer = setTimeout(function () {
      if (hint.parentNode) hint.remove();
    }, 4000);
  }

  function updateAnswerGrid() {
    var dots = answerGrid.querySelectorAll('.answer-dot');
    dots.forEach(function (dot) {
      var qi = parseInt(dot.getAttribute('data-qi'));
      dot.classList.remove('filled', 'cheated');
      if (selections[qi] !== undefined) {
        dot.textContent = LETTERS[selections[qi]];
        if (cheatedQuestions[qi]) {
          dot.classList.add('cheated');
        } else {
          dot.classList.add('filled');
        }
      } else {
        dot.textContent = (qi + 1);
      }
    });
  }

  function updateProgress() {
    var answered = Object.keys(selections).length;
    progressFill.style.width = (answered / TOTAL * 100) + '%';
    btnSubmit.disabled = false;
    if (answered >= TOTAL) {
      btnSubmit.textContent = '交 卷（' + answered + '/' + TOTAL + '）';
    } else {
      btnSubmit.textContent = '交 卷（还剩' + (TOTAL - answered) + '题）';
    }
  }

  // ── 交卷逻辑 ──
  btnSubmit.addEventListener('click', function () {
    var answered = Object.keys(selections).length;

    // 未答完 → 抄答案弹窗
    if (answered < TOTAL) {
      var firstUnanswered = findNextUnanswered(-1);
      if (firstUnanswered === -1) return;
      showCheatModal(
        '还有题没答完！',
        '看一段视频，抄同学第' + (firstUnanswered + 1) + '题的答案',
        '看视频，抄答案',
        function () {
          cheatFillAnswer(firstUnanswered);
          var el = questionsContainer.querySelector('[data-qi="' + firstUnanswered + '"].question-item');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      );
      return;
    }

    // 全部答完 → 检查是否需要复查
    var wrongCount = getWrongCount();
    if (wrongCount > 0 && !reviewUsed) {
      showCheatModal(
        '监考老师偷偷提醒你',
        '你有' + wrongCount + '道题可能答错了，看视频获得一次复查机会',
        '看视频，获得复查机会',
        function () {
          reviewUsed = true;
          highlightWrongQuestions();
          showToast('答错的题已标红，快去改答案！');
        },
        '不用了，直接交卷',
        function () { showResult(); }
      );
      return;
    }

    showResult();
  });

  function getWrongCount() {
    var count = 0;
    QUESTIONS.forEach(function (q, i) {
      if (selections[i] !== undefined) {
        if (!q.options[selections[i]].correct) count++;
      }
    });
    return count;
  }

  function highlightWrongQuestions() {
    QUESTIONS.forEach(function (q, i) {
      var card = questionsContainer.querySelector('[data-qi="' + i + '"].question-item');
      if (!card) return;
      card.classList.remove('review-wrong');
      if (selections[i] !== undefined && !q.options[selections[i]].correct) {
        card.classList.add('review-wrong');
      }
    });
    // 滚动到第一个错题
    var firstWrong = questionsContainer.querySelector('.review-wrong');
    if (firstWrong) {
      firstWrong.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function showResult() {
    var data = Algorithm.run(selections);
    var r = data.rank;
    var score = data.correct * 5;

    pageQuiz.classList.remove('active');
    pageResult.classList.add('active');
    document.querySelector('.answer-sheet').style.display = 'none';
    submitBar.style.display = 'none';
    window.scrollTo(0, 0);

    document.getElementById('result-score').textContent = score;
    document.getElementById('result-rank').textContent = r.name;
    document.getElementById('result-tagline').textContent = '「' + r.tagline + '」';
    document.getElementById('result-desc').textContent = r.description;

    var stamp = document.getElementById('result-stamp');
    stamp.classList.remove('animate');
    void stamp.offsetWidth;
    stamp.classList.add('animate');

    renderScoreTable(data);
    renderDetail(data);
  }

  function renderScoreTable(data) {
    var tbody = document.getElementById('score-tbody');
    var html = '';
    CATEGORY_KEYS.forEach(function (k) {
      var cat = CATEGORIES[k];
      var s = data.categoryScores[k];
      var got = s.correct * 5;
      var full = s.total * 5;
      var perfect = s.correct === s.total;
      html += '<tr>';
      html += '<td>' + cat.name + '</td>';
      html += '<td class="score-value ' + (perfect ? 'score-perfect' : '') + '">' + got + '</td>';
      html += '<td>' + full + '</td>';
      html += '<td>' + s.pct + '%</td>';
      html += '</tr>';
    });
    var totalScore = data.correct * 5;
    html += '<tr style="font-weight:700">';
    html += '<td>总 分</td>';
    html += '<td class="score-value" style="font-size:18px">' + totalScore + '</td>';
    html += '<td>100</td>';
    html += '<td>' + data.pct + '%</td>';
    html += '</tr>';
    tbody.innerHTML = html;
  }

  function renderDetail(data) {
    var container = document.getElementById('detail-container');
    var html = '';
    var currentCat = '';
    var catNames = { rules: '规则认知', history: '历史知识', data: '数据记忆', tactics: '战术理解', trivia: '冷知识' };

    QUESTIONS.forEach(function (q, i) {
      if (q.category !== currentCat) {
        if (currentCat) html += '</div>';
        currentCat = q.category;
        html += '<div class="detail-section"><div class="detail-title">' + catNames[currentCat] + '</div>';
      }
      var userPick = selections[i];
      var isCorrect = q.options[userPick] && q.options[userPick].correct;
      var correctIdx = q.options.findIndex(function (o) { return o.correct; });
      var wasCheated = cheatedQuestions[i];
      var icon = wasCheated ? '📝' : (isCorrect ? '✓' : '✗');
      var cls = wasCheated ? 'detail-correct' : (isCorrect ? 'detail-correct' : 'detail-wrong');

      html += '<div class="detail-item">';
      html += '<span class="' + cls + '">' + icon + '</span> ';
      html += (i + 1) + '. ' + escapeHtml(q.text);
      html += ' <span class="' + cls + '">（你选' + LETTERS[userPick];
      if (wasCheated) html += '·抄的';
      html += '）</span>';
      if (!isCorrect) {
        html += '<div class="detail-answer">正确答案：' + LETTERS[correctIdx] + '. ' + escapeHtml(q.options[correctIdx].text) + '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
    container.innerHTML = html;
  }

  // ── 重考 ──
  document.getElementById('btn-retry').addEventListener('click', function () {
    selections = {};
    cheatedQuestions = {};
    reviewUsed = false;
    pageResult.classList.remove('active');
    pageQuiz.classList.add('active');
    document.querySelector('.answer-sheet').style.display = '';
    submitBar.style.display = '';
    window.scrollTo(0, 0);
    document.getElementById('exam-id').textContent = '2026' + Math.floor(10000000 + Math.random() * 90000000);
    document.getElementById('seat-id').textContent = Math.floor(1 + Math.random() * 30);
    questionsContainer.querySelectorAll('.option-item.selected').forEach(function (el) { el.classList.remove('selected'); });
    questionsContainer.querySelectorAll('.option-item.cheated').forEach(function (el) { el.classList.remove('cheated'); });
    questionsContainer.querySelectorAll('.question-item.answered').forEach(function (el) { el.classList.remove('answered'); });
    questionsContainer.querySelectorAll('.question-item.review-wrong').forEach(function (el) { el.classList.remove('review-wrong'); });
    document.querySelectorAll('.cheat-hint').forEach(function (h) { h.remove(); });
    updateAnswerGrid();
    updateProgress();
  });

  // ── 分享 ──
  document.getElementById('btn-share').addEventListener('click', function () {
    generateShareCard();
  });

  function generateShareCard() {
    var canvas = document.getElementById('share-canvas');
    var ctx = canvas.getContext('2d');
    var W = 640, H = 900;
    canvas.width = W;
    canvas.height = H;

    var data = Algorithm.run(selections);
    var r = data.rank;
    var score = data.correct * 5;

    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
    ctx.lineWidth = 1;
    for (var y = 0; y < H; y += 32) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    ctx.fillStyle = '#cc0000';
    ctx.fillRect(0, 0, W, 4);
    ctx.textAlign = 'center';

    ctx.fillStyle = '#666';
    ctx.font = '20px "Songti SC", serif';
    ctx.fillText('2026年全国足球统一考试', W / 2, 50);

    ctx.fillStyle = '#cc0000';
    ctx.font = 'bold 28px "Songti SC", serif';
    ctx.fillText('成 绩 报 告 单', W / 2, 90);

    ctx.save();
    ctx.translate(W / 2, 210);
    ctx.rotate(-0.14);
    ctx.beginPath(); ctx.arc(0, 0, 70, 0, Math.PI * 2);
    ctx.strokeStyle = '#cc0000'; ctx.lineWidth = 4; ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, 78, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(204,0,0,0.3)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#cc0000';
    ctx.font = 'bold 52px "Songti SC", serif';
    ctx.fillText(score, 0, 16);
    ctx.font = '14px "Songti SC", serif';
    ctx.fillText('分', 0, 40);
    ctx.restore();

    ctx.fillStyle = '#cc0000';
    ctx.font = 'bold 26px "Songti SC", serif';
    ctx.fillText('【' + r.name + '】', W / 2, 330);

    ctx.fillStyle = '#333';
    ctx.font = 'italic 20px "Songti SC", serif';
    ctx.fillText('「' + r.tagline + '」', W / 2, 365);

    var tableY = 410;
    var colX = [100, 260, 380, 520];
    var headers = ['题型', '得分', '满分', '正确率'];

    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(60, tableY - 20, W - 120, 32);
    ctx.fillStyle = '#333';
    ctx.font = 'bold 16px "Songti SC", serif';
    ctx.textAlign = 'center';
    headers.forEach(function (h, i) { ctx.fillText(h, colX[i], tableY); });

    ctx.font = '15px "Songti SC", serif';
    CATEGORY_KEYS.forEach(function (k, i) {
      var cat = CATEGORIES[k];
      var s = data.categoryScores[k];
      var y = tableY + 36 + i * 32;
      ctx.fillStyle = '#333';
      ctx.fillText(cat.name, colX[0], y);
      ctx.fillStyle = s.correct === s.total ? '#cc0000' : '#333';
      ctx.font = 'bold 16px "Songti SC", serif';
      ctx.fillText(s.correct * 5 + '', colX[1], y);
      ctx.fillStyle = '#999';
      ctx.font = '15px "Songti SC", serif';
      ctx.fillText(s.total * 5 + '', colX[2], y);
      ctx.fillText(s.pct + '%', colX[3], y);
    });

    var totalY = tableY + 36 + 5 * 32;
    ctx.fillStyle = 'rgba(0,0,0,0.04)';
    ctx.fillRect(60, totalY - 18, W - 120, 30);
    ctx.fillStyle = '#333';
    ctx.font = 'bold 16px "Songti SC", serif';
    ctx.fillText('总分', colX[0], totalY);
    ctx.fillStyle = '#cc0000';
    ctx.font = 'bold 20px "Songti SC", serif';
    ctx.fillText(score + '', colX[1], totalY);
    ctx.fillStyle = '#999';
    ctx.font = '15px "Songti SC", serif';
    ctx.fillText('100', colX[2], totalY);
    ctx.fillText(data.pct + '%', colX[3], totalY);

    var cheatedCount = Object.keys(cheatedQuestions).length;
    if (cheatedCount > 0) {
      ctx.fillStyle = '#2e7d32';
      ctx.font = '14px "Songti SC", serif';
      ctx.fillText('（其中' + cheatedCount + '题为抄学霸答案）', W / 2, totalY + 30);
    }

    ctx.fillStyle = '#bbb';
    ctx.font = '14px "Songti SC", serif';
    ctx.textAlign = 'center';
    ctx.fillText('全国足球统一考试委员会（盖章）', W / 2, H - 60);
    ctx.fillText('懂球帝出品', W / 2, H - 35);

    document.getElementById('share-modal').classList.add('show');
  }

  document.getElementById('btn-save-card').addEventListener('click', function () {
    var canvas = document.getElementById('share-canvas');

      timeout: self.options.preloadCallbackTimeout,
      allowTimeout: !!self.options.preloadAllowTimeout
    });
  };

  UnifiedRewardBridge.prototype.buildShowPayload = function (payload, options) {
    var platform = this.getPlatform(options && options.platform || this.currentPlatform);
    var sceneId = (options && options.sceneId) || this.options.sceneId;

    if (platform === 'ios') {
      return extend({}, payload, {
        id: payload.id || sceneId,
        relate_id: payload.relate_id || payload.id || sceneId
      });
    }

    return extend({
      id: sceneId,
      data: {}
    }, payload);
  };

  UnifiedRewardBridge.prototype.show = function (payloadOrOptions, callback) {
    var cb = callback;
    var payload = payloadOrOptions;

    if (isFunction(payloadOrOptions)) {
      cb = payloadOrOptions;
      payload = null;
    }

    if (!payload || (payload && !payload.sdk_id && !payload.sdkId)) {
      payload = this.currentPayload;
    }

    if (!payload) {
      if (isFunction(cb)) cb(createSdkError('REWARD_PAYLOAD_MISSING', '缺少可用 payload，请先 requestAd/preload'));
      return;
    }

    payload = this.buildShowPayload(payload, {});
    this.setPayload(payload);
    this.callHandler('connectVideo', payload, function (err, response, meta) {
      if (err) {
        if (isFunction(cb)) cb(wrapSdkError(err, 'REWARD_SHOW_FAILED', err.message, {
          payload: payload
        }));
        return;
      }

      if (meta && meta.timeout && !this.options.showAllowTimeoutAsSuccess) {
        if (isFunction(cb)) cb(createSdkError('REWARD_SHOW_TIMEOUT', 'connectVideo 回调超时', {
          payload: payload,
          timeoutMs: meta.timeoutMs
        }));
        return;
      }

      if (isFunction(cb)) cb(null, response, extend({}, meta, {
        timeoutHandled: !!(meta && meta.timeout),
        timeoutAsSuccess: !!(meta && meta.timeout && this.options.showAllowTimeoutAsSuccess)
      }));
    }.bind(this), {
      timeout: this.options.showCallbackTimeout,
      allowTimeout: !!this.options.showAllowTimeoutAsSuccess
    });
  };

  UnifiedRewardBridge.prototype.requestAndPreload = function (options, callback) {
    var self = this;
    var cb = callback;
    var opts = options || {};

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.requestAd(opts, function (err, payload, detail) {
      if (err) {
        if (isFunction(cb)) cb(err);
        return;
      }

      self.preload(payload, function (preErr, preResp, preMeta) {
        if (preErr) {
          if (isFunction(cb)) cb(preErr);
          return;
        }

        self.setPreloadedPayload(payload, detail && detail.platform);
        if (isFunction(cb)) {
          cb(null, payload, {
            platform: detail.platform,
            adRequest: detail,
            preloadResponse: preResp,
            preloadMeta: preMeta
          });
        }
      });
    });
  };

  UnifiedRewardBridge.prototype.requestPreloadAndShow = function (options, callback) {
    var self = this;
    var cb = callback;
    var opts = options || {};

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.requestAndPreload(opts, function (err, payload, detail) {
      if (err) {
        if (isFunction(cb)) cb(err);
        return;
      }

      self.show(payload, function (showErr, showResp, showMeta) {
        if (isFunction(cb)) {
          cb(showErr || null, {
            platform: detail.platform,
            payload: payload,
            adRequest: detail.adRequest,
            preloadResponse: detail.preloadResponse,
            preloadMeta: detail.preloadMeta,
            showResponse: showResp,
            showMeta: showMeta
          });
        }
      });
    });
  };

  UnifiedRewardBridge.prototype.showWithPreloadedOrRequest = function (options, callback) {
    var self = this;
    var cb = callback;
    var opts = options || {};
    var cachedPayload;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    cachedPayload = this.consumePreloadedPayload({
      maxAge: opts.maxAge,
      keep: !!opts.keepPreloaded
    });

    if (cachedPayload) {
      this.show(cachedPayload, function (showErr, showResp, showMeta) {
        if (isFunction(cb)) {
          cb(showErr || null, {
            fromCache: true,
            payload: cachedPayload,
            showResponse: showResp,
            showMeta: showMeta
          });
        }
      });
      return;
    }

    this.requestAndPreload(opts, function (err, payload, detail) {
      if (err) {
        if (isFunction(cb)) cb(err);
        return;
      }

      self.show(payload, function (showErr, showResp, showMeta) {
        if (isFunction(cb)) {
          cb(showErr || null, {
            fromCache: false,
            platform: detail.platform,
            payload: payload,
            adRequest: detail.adRequest,
            preloadResponse: detail.preloadResponse,
            preloadMeta: detail.preloadMeta,
            showResponse: showResp,
            showMeta: showMeta
          });
        }
      });
    });
  };

  UnifiedRewardBridge.prototype.onDisconnectVideo = function (listener, callback) {
    var self = this;

    if (isFunction(listener)) {
      this._disconnectListeners.push(listener);
    }

    if (this._disconnectRegistered) {
      if (isFunction(callback)) callback(null);
      return;
    }

    this.getBridge(function (error, bridge) {
      if (error) {
        if (isFunction(callback)) callback(error);
        return;
      }

      if (!bridge.registerHandler) {
        if (isFunction(callback)) {
          callback(createSdkError('REWARD_DISCONNECT_HANDLER_UNSUPPORTED', 'bridge 不支持 registerHandler，无法监听 disConnectVideo'));
        }
        return;
      }

      bridge.registerHandler('disConnectVideo', function (cbData, responseCallback) {
        var i;
        self.log('receive disConnectVideo', cbData);

        for (i = 0; i < self._disconnectListeners.length; i += 1) {
          try {
            self._disconnectListeners[i](cbData || {});
          } catch (listenerError) {
            self.log('disConnectVideo listener error', { message: listenerError.message });
          }
        }

        if (isFunction(responseCallback)) {
          responseCallback({ ok: true });
        }
      });

      self._disconnectRegistered = true;
      if (isFunction(callback)) callback(null);
    });
  };

  root.UnifiedRewardSDK = {
    create: function (options) {
      var runtimeConfig = normalizeConfig(root.__UNIFIED_REWARD_CONFIG || EMBEDDED_CONFIG);
      var runtimeDefaults = buildDefaultsFromConfig(runtimeConfig);
      return new UnifiedRewardBridge(options, runtimeDefaults);
    },
    Constructor: UnifiedRewardBridge,
    utils: {
      detectPlatformByUA: detectPlatformByUA,
      normalizeOrigin: normalizeOrigin,
      createSdkError: createSdkError,
      getEmbeddedConfig: function () {
        return clone(EMBEDDED_CONFIG);
      }
    }
  };
})(window);
  </script>

  <script>
/**
 * 激励视频统一接入层
 * 真实SDK可用时走UnifiedRewardSDK，否则降级mock倒计时
 */
(function (root) {
  'use strict';

  var sdkInstance = null;
  var sdkReady = false;

  function initSdk() {
    if (!root.UnifiedRewardSDK) {
      console.warn('[RewardAd] UnifiedRewardSDK not found, will use mock');
      return;
    }

    root.__UNIFIED_REWARD_CONFIG = {
      platform: 'auto',
      sceneId: 'footballIQ_gaokao',
      behavior: {
        callbackTimeout: 3000,
        preloadCallbackTimeout: 3000,
        showCallbackTimeout: 3000,
        preloadAllowTimeout: true,
        showAllowTimeoutAsSuccess: true,
        bridgeDetectTimeout: 3000,
        readyRetryTimeout: 4000,
        readyRetryInterval: 300,
        preloadMaxAge: 600000
      },
      reward: {
        reward_name: 'cheat_answer',
        reward_amount: '1',
        data: JSON.stringify({ entry: 'footballIQ_gaokao', play_trigger: 'cheat_or_review' })
      }
    };

    sdkInstance = root.UnifiedRewardSDK.create({
      onLog: function (title, data) {
        console.log('[RewardAd]', title, data);
      }
    });

    sdkInstance.ensureReady(function (readyErr) {
      if (readyErr) {
        console.warn('[RewardAd] bridge not ready, will use mock:', readyErr.message);
        return;
      }
      sdkReady = true;
      console.log('[RewardAd] bridge ready, preloading...');
      sdkInstance.requestAndPreload(function (preErr) {
        if (preErr) console.warn('[RewardAd] preload fail:', preErr.message);
        else console.log('[RewardAd] preload done');
      });
    });
  }

  function showRewardVideo(onSuccess, onFail) {
    if (sdkReady && sdkInstance) {
      sdkInstance.showWithPreloadedOrRequest({ keepPreloaded: true }, function (err, detail) {
        if (err) {
          console.warn('[RewardAd] show fail:', err.message);
          if (onFail) onFail(err);
          else if (onSuccess) onSuccess();
          return;
        }
        console.log('[RewardAd] show success', detail);
        if (onSuccess) onSuccess();
        setTimeout(function () {
          sdkInstance.requestAndPreload(function (e) {
            if (e) console.warn('[RewardAd] bg preload fail:', e.message);
            else console.log('[RewardAd] bg preload done');
          });
        }, 500);
      });
    } else {
      showMockAd(onSuccess);
    }
  }

  function showMockAd(callback) {
    var modal = document.getElementById('reward-ad-modal');
    var countdown = document.getElementById('reward-countdown');
    var progressFill = document.getElementById('reward-progress-fill');

    modal.classList.add('show');
    progressFill.style.transition = 'none';
    progressFill.style.width = '0%';
    var count = 3;
    countdown.textContent = count;

    void progressFill.offsetWidth;
    progressFill.style.transition = 'width 1s linear';

    var timer = setInterval(function () {
      count--;
      progressFill.style.width = ((3 - count) / 3 * 100) + '%';
      if (count > 0) {
        countdown.textContent = count;
      } else {
        clearInterval(timer);
        countdown.textContent = '✓';
        setTimeout(function () {
          modal.classList.remove('show');
          progressFill.style.width = '0%';
          if (callback) callback();
        }, 400);
      }
    }, 1000);
  }

  initSdk();

  root.RewardAd = {
    show: showRewardVideo,
    isReady: function () { return sdkReady; }
  };

})(window);
  </script>
